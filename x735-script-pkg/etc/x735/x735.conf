# User configuration file for the x735-daemon.
# Only define the parameters you wish to override; other values will use defaults.
# Note: Physical pin numbers are hardcoded and cannot be configured here.

# PWM channel (usually 1 for default X735 HAT boards)
# PWM_CHANNEL=1

# PWM frequency in Hz (default 2000)
# PWM_HERTZ=2000

# Temperature polling and daemon loop interval in seconds (default 5)
# SLEEP_INTERVAL=5

# Print verbose debug messages to standard output / systemd journal
# SHOW_DEBUG=false

# Expose a Prometheus metrics endpoint on http://localhost:9735/metrics
# ENABLE_METRICS=false

# Port on which to expose the Prometheus metrics HTTP server (default 9735)
# METRICS_PORT=9735

# Minimum duration of press to trigger a reboot (in milliseconds, default 200)
# REBOOT_PULSE_MIN=200

# Duration of press to trigger safe shutdown (in milliseconds, default 600)
# REBOOT_PULSE_MAX=600

# Custom Fan Curve
# List of CPU temperatures (Celsius) and matching duty cycle percentages.
# The number of values in both lists must be identical.
# FAN_THRESHOLDS=25 40 50 60 70 75
# FAN_DUTY_CYCLES=40 45 50 70 80 100
