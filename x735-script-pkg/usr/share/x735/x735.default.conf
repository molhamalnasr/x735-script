# Default configuration file for the x735-daemon.
# These values are used if /etc/x735/x735.conf is missing or has invalid settings.
# Do NOT edit this file. To customize settings, edit /etc/x735/x735.conf.

# PWM configuration
PWM_CHANNEL=1
PWM_HERTZ=2000

# Daemon polling intervals
SLEEP_INTERVAL=5
SHOW_DEBUG=false

# Metrics Configuration (Exposes Prometheus metrics on port :9735/metrics)
ENABLE_METRICS=false
METRICS_PORT=9735

# Timing parameters for button pulse (in milliseconds)
REBOOT_PULSE_MIN=200
REBOOT_PULSE_MAX=600

# Fan speed thresholds (Celsius) and matching duty cycle percentages.
# Note: The number of thresholds must match the number of duty cycles!
FAN_THRESHOLDS=25 40 50 60 70 75
FAN_DUTY_CYCLES=40 45 50 70 80 100
